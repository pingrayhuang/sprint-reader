<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Sprint Reader — Pre-Sprint</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="splash">
  <div class="splash">
    <div>
      <div class="splash-header">
        <a href="index.html" style="color: var(--fg-dim); text-decoration: none;">← 換章節</a>
      </div>
      <div class="splash-tags"></div>
      <div class="splash-doc">Source: Loading…</div>
      <h1 class="splash-title">Loading…</h1>
      <div class="splash-warning">
        <b>⚠️ 限時挑戰</b>
        <ul>
          <li>限時 <span id="warning-time">—</span></li>
          <li><span id="warning-pages">—</span></li>
          <li>結束後立即 <span id="warning-quiz">—</span></li>
        </ul>
      </div>
    </div>
    <div>
      <button id="start-btn" class="btn-primary">開始 7 分鐘 Sprint →</button>
      <div class="splash-foot">
        切離視窗會自動暫停計時，但會記錄分心次數。
      </div>
    </div>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
